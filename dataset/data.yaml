# Dataset configuration for custom YOLO training
# Update paths and class names according to your project

path: ../dataset          # root dir
train: images/train       # train images (relative to 'path')
val: images/val           # val images
test: images/test         # test images (optional)

# Number of classes
nc: 2

# Class names — UPDATE THESE with your custom classes
names:
  0: classe_1
  1: classe_2

# Pre-trained weights (COCO classes included via transfer learning)
# The model already knows: person, bicycle, car, motorcycle, airplane, bus,
# train, truck, boat, traffic light, fire hydrant, stop sign, parking meter,
# bench, bird, cat, dog, horse, sheep, cow, elephant, bear, zebra, giraffe,
# backpack, umbrella, handbag, tie, suitcase, frisbee, skis, snowboard,
# sports ball, kite, baseball bat, baseball glove, skateboard, surfboard,
# tennis racket, bottle, wine glass, cup, fork, knife, spoon, bowl, banana,
# apple, sandwich, orange, broccoli, carrot, hot dog, pizza, donut, cake,
# chair, couch, potted plant, bed, dining table, toilet, tv, laptop, mouse,
# remote, keyboard, cell phone, microwave, oven, toaster, sink, refrigerator,
# book, clock, vase, scissors, teddy bear, hair drier, toothbrush
